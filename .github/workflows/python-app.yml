name: Build Executables
on:
  push:
    branches: ["main"]
  # This adds a manual "Run workflow" button to your GitHub Actions tab
  workflow_dispatch: 
permissions:
  contents: write 
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows-GUI
            artifact: MinervaWorker-Windows
            pyinstaller_flags: >-
              --windowed
              --collect-all customtkinter
            extra_deps: ".[gui]"
          - os: ubuntu-latest
            name: Linux-Headless
            artifact: MinervaWorker-Linux-Headless
            pyinstaller_flags: ""
            extra_deps: "."
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      # AUTOMATION: Extract the version directly from pyproject.toml
      - name: Extract Version
        id: extract_version
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; data=tomllib.load(open('pyproject.toml','rb')); print(data['project']['version'])")
          echo "APP_VERSION=v$VERSION" >> $GITHUB_ENV
      - name: Install Python deps
        run: |
          uv pip install pyinstaller
          uv pip install -e "${{ matrix.extra_deps }}"
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          uv run pyinstaller \
            --noconfirm \
            --onefile \
            --name "${{ matrix.artifact }}" \
            ${{ matrix.pyinstaller_flags }} \
            main.py
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run pyinstaller `
            --noconfirm `
            --onefile `
            --name "${{ matrix.artifact }}" `
            ${{ matrix.pyinstaller_flags }} `
            main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.artifact }}.exe
            dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30
          
      # PUBLISH: Only create a release if you clicked the manual button
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: Release ${{ env.APP_VERSION }}
          files: |
            dist/${{ matrix.artifact }}.exe
            dist/${{ matrix.artifact }}
