name: Build Dual-Target Executables

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-windows-gui:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        uv pip install pyinstaller
        uv pip install -e .[gui]

    - name: Build Windows GUI Executable
      run: |
        uv run pyinstaller --noconfirm --onefile --windowed --name "MinervaWorker-GUI-Win" --collect-all customtkinter "main_gui.py"

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinervaWorker-GUI-Windows
        path: dist/MinervaWorker-GUI-Win.exe
        retention-days: 7

  build-linux-headless:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        uv pip install pyinstaller
        uv pip install -e .

    - name: Build Linux CLI Executable
      run: |
        uv run pyinstaller --noconfirm --onefile --name "MinervaWorker-CLI-Linux" "main_cli.py"

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinervaWorker-CLI-Linux
        path: dist/MinervaWorker-CLI-Linux
        retention-days: 7
