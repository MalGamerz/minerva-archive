readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
gui = [
    "customtkinter>=5.2.2",
]

[tool.setuptools]
py-modules = ["main", "engine", "config", "auth", "utils"]
