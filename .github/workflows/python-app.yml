name: Build MinervaWorker Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Speeds up future builds

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "MinervaWorker" --collect-all customtkinter "main.py"

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MinervaWorker-Windows-EXE
        path: dist/MinervaWorker.exe
        retention-days: 7
